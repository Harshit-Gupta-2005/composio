# Single source of truth for Node, Bun, Deno, Python, uv, and pnpm versions.
#
# Local dev:  `mise install` (after `brew install mise` / `winget install jdx.mise` / `curl https://mise.run | sh`)
# CI:         driven by `jdx/mise-action` in the composite actions under `.github/actions/`
#
# pnpm is pinned through mise's npm backend so mise owns the full local and CI
# toolchain. CI cannot assume Corepack has created a pnpm shim before caching.

min_version = "2026.1.0"

[tools]
node    = "20.20.2"
bun     = "1.3.10"
deno    = "2.6.7"
python  = "3.12"
uv      = "0.8.19"
"npm:pnpm" = "10.28.2"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[settings]
lockfile = true
locked = true
